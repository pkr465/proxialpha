# Alembic configuration for ProxiAlpha control plane.
#
# The database URL is NOT stored here. It is loaded from the environment via
# `core.settings.Settings().database_url` inside `migrations/env.py`. Keeping
# it out of this file means `alembic.ini` is safe to commit.

[alembic]
# Path to the migration scripts, relative to this file.
script_location = migrations

# Template used for generating new revision files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps.
timezone = UTC

# Max length for the "slug" portion of the filename.
truncate_slug_length = 40

# Directory separators used by the script_location (single dir).
version_locations = %(here)s/migrations/versions

# Path separator for version_locations entries.
version_path_separator = os

# Character set used by the revision files.
output_encoding = utf-8

# Placeholder — the real URL is injected at runtime in env.py.
# Alembic still requires this key to exist.
sqlalchemy.url = driver://user:pass@localhost/dbname


# ---------------------------------------------------------------------------
# Logging configuration. Alembic uses Python's logging module; these sections
# must be present or `alembic` will fail to start.
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
