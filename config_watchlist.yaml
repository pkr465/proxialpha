# ---- WATCHLIST MANAGEMENT ----
auto_scan:
  enabled: true
  frequency: "daily"               # daily, hourly, or realtime
  add_threshold: 0.40             # Auto-add stocks with 40%+ drawdown
  remove_threshold: 0.10          # Remove if drawdown < 10% (recovered)
